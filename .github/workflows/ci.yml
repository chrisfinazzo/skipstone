name: Continuous Integration

on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:

jobs:
  ci:
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'ubuntu-latest'
          - 'macos-latest'
          #- 'windows-latest'
        swift:
          - '6.2.3'

    steps:
      # checkout both skipstone.git and skip.git for the linked SkipDrive
      - name: Checkout skipstone.git
        uses: actions/checkout@v6
        with:
          path: skipstone

      - name: Checkout skip.git
        uses: actions/checkout@v6
        with:
          repository: skiptools/skip
          path: skip

      - uses: swift-actions/setup-swift@v3
        with:
          swift-version: ${{ matrix.swift }}

      - name: Get swift version
        run: swift --version

      - name: Check kotlinc
        run: which kotlinc

      - name: Swift Test (Debug)
        working-directory: skipstone
        run: KOTLINC=kotlinc swift test -v -c debug --parallel

